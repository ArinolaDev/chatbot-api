<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;

            /* 🌈 COOL BACKGROUND */
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }

        /* 🔵 Floating chat bubble */
        #chat-bubble {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: white;
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* 💬 Chat container */
        #chat-container {
            width: 360px;
            height: 520px;
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: white;
            border-radius: 18px;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        /* Header */
        #header {
            background: #4f46e5;
            color: white;
            padding: 12px;
            font-weight: bold;
        }

        /* Chat area */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f9fafb;
        }

        /* User message */
        .user {
            text-align: right;
            background: #4f46e5;
            color: white;
            padding: 8px 12px;
            border-radius: 15px 15px 0 15px;
            margin: 6px 0;
            display: inline-block;
            max-width: 80%;
        }

        /* Bot message */
        .bot {
            text-align: left;
            background: #e5e7eb;
            color: #111;
            padding: 8px 12px;
            border-radius: 15px 15px 15px 0;
            margin: 6px 0;
            display: inline-block;
            max-width: 80%;
        }

        /* Input area */
        .input-area {
            display: flex;
            padding: 10px;
            gap: 5px;
            background: white;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #3730a3;
        }

        /* ✨ Optional center text on page */
        .center-text {
            color: white;
            text-align: center;
            margin-top: 200px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- 🌟 Optional landing text -->
<div class="center-text">
    Welcome to Arinola Ai Chatbot
</div>

<!-- 🔵 Floating button -->
<div id="chat-bubble" onclick="toggleChat()">&#128172;</div>

<!-- 💬 Chat box -->
<div id="chat-container">
    <div id="header">Arinola E-commerce Chat Support</div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

function toggleChat() {
    let chatBox = document.getElementById("chat-container");

    if (chatBox.style.display === "none" || chatBox.style.display === "") {
        chatBox.style.display = "flex";
    } else {
        chatBox.style.display = "none";
    }
}

async function sendMessage() {
    let input = document.getElementById("userInput").value;
    let chat = document.getElementById("chat");

    if (!input) return;

    chat.innerHTML += `<div class="user">${input}</div>`;

    let response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: input })
    });

    let data = await response.json();

    chat.innerHTML += `<div class="bot">${data.response}</div>`;

    document.getElementById("userInput").value = "";
    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
